<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sign in | Cultivate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.auth0.com/js/lock/12.2.3/lock.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #18181b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .cultivate-brand {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .cultivate-brand h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      margin: 0 0 0.25rem 0;
      color: #18181b;
    }
    .cultivate-brand p {
      font-size: 0.875rem;
      color: #71717a;
      margin: 0;
    }
    #root {
      width: 100%;
      max-width: 400px;
    }
    /* Lock overrides to match Cultivate */
    .auth0-lock {
      font-family: 'Inter', sans-serif !important;
    }
    .auth0-lock-header {
      background: transparent !important;
    }
    .auth0-lock-name {
      display: none;
    }
    .auth0-lock-submit {
      background: #18181b !important;
      background-color: #18181b !important;
      border: none !important;
      border-radius: 0.5rem !important;
      font-weight: 500 !important;
    }
    .auth0-lock-submit:hover {
      background: #27272a !important;
      background-color: #27272a !important;
    }
    .auth0-lock-input {
      border-color: #e4e4e7 !important;
      border-radius: 0.5rem !important;
    }
    .auth0-lock-input:focus {
      border-color: #18181b !important;
      box-shadow: 0 0 0 2px rgba(24, 24, 27, 0.2) !important;
    }
  </style>
</head>
<body>
  <div class="cultivate-brand">
    <h1>Cultivate</h1>
    <p>Connect farmers with restaurants</p>
  </div>
  <div id="root"></div>
  <script>
    var config = config || {};
    var lock = new Auth0Lock(config.clientID, config.auth0Domain, {
      auth: {
        redirectUrl: config.callbackURL,
        responseType: (config.internalOptions || {}).responseType || 'code',
        params: config.extraParams || {}
      },
      theme: {
        primaryColor: '#18181b',
        logo: ''
      },
      languageDictionary: {
        title: ''
      }
    });
    lock.show();
  </script>
</body>
</html>
